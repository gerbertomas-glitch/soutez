<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>

<body class="hockey-bg">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // KONFIGURACE FIREBASE (TVOJE ÚDAJE)
        const firebaseConfig = {
            apiKey: "AIzaSyANCEwT20Z4-j-J3UHnY8YpRyAl6f7Nj3Y",
            authDomain: "soutez-141086.firebaseapp.com",
            projectId: "soutez-141086",
            storageBucket: "soutez-141086.firebasestorage.app",
            messagingSenderId: "1024208635457",
            appId: "1:1024208635457:web:3b976a8d7a91d8420ee8c0",
            measurementId: "G-CVTDFBCFZ5"
        };
        
        // Inicializace služeb
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Export služeb pro React komponentu
        window.FirebaseServices = { auth, db, doc, onSnapshot, setDoc, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { auth, db, doc, onSnapshot, setDoc, signInAnonymously, onAuthStateChanged } = window.FirebaseServices;

        // VERZE DATABÁZE
        const APP_DB_ID = 'view-cz-ms-2026-v7';

        const INITIAL_TEAMS = [
            { id: 't1', name: 'Lvi', target: 20000, currency: 'EUR', country: 'CZ' },
            { id: 't2', name: 'Vlci', target: 20000, currency: 'EUR', country: 'SK' }
        ];

        // Výchozí data obchodníků
        const INITIAL_DATA = [
            { id: '1', name: 'Jan Novák', teamId: 't1', photoUrl: '', target: 8000, clients: 0, rev: 0, pkgMini: 0, pkgBasic: 0, pkgPro: 0, currency: 'EUR' },
            { id: '2', name: 'Petr Svoboda', teamId: 't2', photoUrl: '', target: 6000, clients: 0, rev: 0, pkgMini: 0, pkgBasic: 0, pkgPro: 0, currency: 'EUR' },
            { id: '3', name: 'Lucie Černá', teamId: 't1', photoUrl: '', target: 10000, clients: 0, rev: 0, pkgMini: 0, pkgBasic: 0, pkgPro: 0, currency: 'EUR' }
        ];

        function App() {
            const [salesData, setSalesData] = useState([]);
            const [availableTeams, setAvailableTeams] = useState([]);
            const [globalTarget, setGlobalTarget] = useState(40000); 
            
            const [view, setView] = useState('board'); 
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminPin, setAdminPin] = useState('');
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinError, setPinError] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [repToDelete, setRepToDelete] = useState(null);

            const [newTeamName, setNewTeamName] = useState('');

            // --- PŘIPOJENÍ K FIREBASE ---
            useEffect(() => {
                signInAnonymously(auth).catch(err => console.error("Chyba přihlášení:", err));

                const unsubscribeAuth = onAuthStateChanged(auth, (user) => {
                    if (user) {
                        const docRef = doc(db, 'artifacts', APP_DB_ID, 'public', 'data', 'sales', 'main');
                        
                        const unsubscribeSnap = onSnapshot(docRef, (snap) => {
                            if (snap.exists()) {
                                const data = snap.data();
                                setSalesData(data.users || []);
                                setGlobalTarget(data.globalTarget !== undefined ? data.globalTarget : 40000);
                                setAvailableTeams(data.teams || INITIAL_TEAMS);
                            } else {
                                setDoc(docRef, { users: INITIAL_DATA, globalTarget: 40000, teams: INITIAL_TEAMS });
                                setSalesData(INITIAL_DATA);
                                setGlobalTarget(40000);
                                setAvailableTeams(INITIAL_TEAMS);
                            }
                            setIsLoading(false);
                        }, (err) => {
                            console.error("Chyba databáze:", err);
                            setIsLoading(false);
                        });
                        return () => unsubscribeSnap();
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            // --- LOGIKA UKLÁDÁNÍ ---
            const pushToCloud = async (newData, newTarget, newTeams) => {
                const finalTarget = newTarget !== undefined ? newTarget : globalTarget;
                const finalTeams = newTeams !== undefined ? newTeams : availableTeams;
                
                setSalesData(newData);
                if (newTarget !== undefined) setGlobalTarget(newTarget);
                if (newTeams !== undefined) setAvailableTeams(newTeams);
                
                try {
                    const docRef = doc(db, 'artifacts', APP_DB_ID, 'public', 'data', 'sales', 'main');
                    await setDoc(docRef, { users: newData, globalTarget: finalTarget, teams: finalTeams });
                } catch (err) {
                    console.error("Zápis do cloudu selhal:", err);
                }
            };

            const handleGlobalTargetChange = (e) => {
                const val = e.target.value === '' ? '' : Number(e.target.value);
                pushToCloud(salesData, val, availableTeams);
            };

            // SPRÁVA TÝMŮ
            const addTeam = () => {
                const trimmed = newTeamName.trim();
                if (trimmed) {
                    const newTeam = { id: 'team-' + Date.now(), name: trimmed, target: 0, currency: 'EUR', country: 'CZ' };
                    pushToCloud(salesData, globalTarget, [...availableTeams, newTeam]);
                    setNewTeamName('');
                }
            };

            const updateTeam = (id, field, value) => {
                let parsedValue = value;
                if (field === 'target') parsedValue = value === '' ? '' : Number(value);
                const newTeams = availableTeams.map(t => t.id === id ? { ...t, [field]: parsedValue } : t);
                pushToCloud(salesData, globalTarget, newTeams);
            };

            const deleteTeam = (teamIdToDelete) => {
                const newTeams = availableTeams.filter(t => t.id !== teamIdToDelete);
                const newData = salesData.map(rep => rep.teamId === teamIdToDelete ? { ...rep, teamId: '' } : rep);
                pushToCloud(newData, globalTarget, newTeams);
            };

            // SPRÁVA OBCHODNÍKŮ
            const updateRep = (id, field, value) => {
                let parsedValue = value;
                if (['clients', 'rev', 'target', 'pkgMini', 'pkgBasic', 'pkgPro'].includes(field)) {
                    parsedValue = value === '' ? '' : Number(value);
                }
                const newData = salesData.map(rep => rep.id === id ? { ...rep, [field]: parsedValue } : rep);
                pushToCloud(newData, globalTarget, availableTeams);
            };

            const addRep = (teamId = '') => {
                const newRep = { id: Date.now().toString(), name: 'Nový Hráč', teamId: teamId, photoUrl: '', target: 0, clients: 0, rev: 0, pkgMini: 0, pkgBasic: 0, pkgPro: 0, currency: 'EUR' };
                pushToCloud([...salesData, newRep], globalTarget, availableTeams);
            };

            const deleteRep = () => {
                if (repToDelete) {
                    pushToCloud(salesData.filter(rep => rep.id !== repToDelete), globalTarget, availableTeams);
                    setRepToDelete(null);
                }
            };

            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (adminPin === '9175') {
                    setIsAdmin(true);
                    setShowPinModal(false);
                    setAdminPin('');
                    setPinError('');
                } else {
                    setPinError('Nesprávný PIN.');
                }
            };

            // PŘEPOČTY MĚN (Základní kurz: 1 EUR = 25 CZK, 1 CZK = 15.5 HUF -> 1 EUR = 387.5 HUF)
            const getValInEUR = (val, currency) => {
                const v = Number(val) || 0;
                if (currency === 'EUR') return v;
                if (currency === 'CZK') return v / 25;
                if (currency === 'HUF') return v / (25 * 15.5);
                return v;
            };

            const getValFromEUR = (valEUR, currency) => {
                const v = Number(valEUR) || 0;
                if (currency === 'CZK') return v * 25;
                if (currency === 'HUF') return v * 25 * 15.5;
                return v;
            };

            // VIZUÁLNÍ POMOCNÍCI (VLAJKY A AVATARY)
            const getFlagEmoji = (countryCode) => {
                if (countryCode === 'CZ') return '🇨🇿';
                if (countryCode === 'SK') return '🇸🇰';
                if (countryCode === 'HU') return '🇭🇺';
                return '🏳️';
            };

            const getAvatarUrl = (rep) => {
                if (rep.photoUrl && rep.photoUrl.trim() !== '') {
                    return rep.photoUrl;
                }
                return `https://ui-avatars.com/api/?name=${encodeURIComponent(rep.name)}&background=e2e8f0&color=334155&bold=true`;
            };

            // Pomocník pro zjištění státu (vlajky) obchodníka podle jeho týmu
            const getRepCountry = (teamId) => {
                const team = availableTeams.find(t => t.id === teamId);
                return team ? team.country : 'CZ'; // Default CZ, pokud nemá tým
            };

            // VÝPOČTY PRO FIREMNÍ A TÝMOVÝ PŘEHLED (VŠE V EUR, s možností lokálního zobrazení)
            const overviewStats = useMemo(() => {
                let globalRevEUR = 0;
                const teamsMap = {};

                availableTeams.forEach(t => {
                    const tCurrency = t.currency || 'EUR';
                    const tTargetEUR = getValInEUR(t.target, tCurrency);
                    teamsMap[t.id] = { id: t.id, name: t.name, country: t.country || 'CZ', target: t.target || 0, currency: tCurrency, targetEUR: tTargetEUR, revEUR: 0, clients: 0, reps: [] };
                });

                const unassigned = { id: 'unassigned', name: 'Bez týmu', country: '', target: 0, currency: 'EUR', targetEUR: 0, revEUR: 0, clients: 0, reps: [] };

                const enrichedReps = salesData.map(rep => ({
                    ...rep,
                    currency: rep.currency || 'EUR',
                    revEUR: getValInEUR(rep.rev, rep.currency || 'EUR'),
                    targetEUR: getValInEUR(rep.target, rep.currency || 'EUR')
                }));

                enrichedReps.forEach(rep => {
                    const tId = (rep.teamId && teamsMap[rep.teamId]) ? rep.teamId : 'unassigned';
                    const repClients = Number(rep.clients) || 0;

                    globalRevEUR += rep.revEUR;

                    if (tId !== 'unassigned') {
                        teamsMap[tId].revEUR += rep.revEUR;
                        teamsMap[tId].clients += repClients;
                        teamsMap[tId].reps.push(rep);
                    } else {
                        unassigned.revEUR += rep.revEUR;
                        unassigned.clients += repClients;
                        unassigned.reps.push(rep);
                    }
                });

                const sortedTeams = Object.values(teamsMap).sort((a, b) => b.revEUR - a.revEUR);
                
                if (unassigned.reps.length > 0) {
                    sortedTeams.push(unassigned);
                }

                return {
                    global: { revEUR: globalRevEUR },
                    teams: sortedTeams
                };
            }, [salesData, availableTeams]);

            // Výpočet VIEW Bodů (Zlatá Helma)
            const getZlataHelmaStats = (rep) => {
                const basePoints = getValInEUR(rep.rev, rep.currency);
                const bonusMini = (Number(rep.pkgMini) || 0) * 20;
                const bonusBasic = (Number(rep.pkgBasic) || 0) * 50;
                const bonusPro = (Number(rep.pkgPro) || 0) * 150;
                const totalBonus = bonusMini + bonusBasic + bonusPro;

                return {
                    totalPoints: Math.floor(basePoints + totalBonus),
                    basePoints: Math.floor(basePoints),
                    totalBonus: totalBonus
                };
            };

            // Seřazení pro soutěže
            const sortedHelma = useMemo(() => {
                return [...salesData].sort((a, b) => getZlataHelmaStats(b).totalPoints - getZlataHelmaStats(a).totalPoints);
            }, [salesData]);

            const sortedHatTrick = useMemo(() => {
                return [...salesData].sort((a, b) => {
                    const clientsA = Number(a.clients) || 0;
                    const clientsB = Number(b.clients) || 0;
                    if (clientsA === clientsB) {
                        return getValInEUR(b.rev, b.currency || 'EUR') - getValInEUR(a.rev, a.currency || 'EUR');
                    }
                    return clientsB - clientsA;
                });
            }, [salesData]);
            
            const formatEUR = (v) => new Intl.NumberFormat('cs-CZ', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(v || 0);

            // Obecný formátovač měny
            const formatCurrency = (val, currencyCode) => {
                const c = currencyCode || 'EUR';
                if (c === 'HUF') return `${new Intl.NumberFormat('cs-CZ', { maximumFractionDigits: 0 }).format(val || 0)} HUF`;
                if (c === 'CZK') return new Intl.NumberFormat('cs-CZ', { style: 'currency', currency: 'CZK', maximumFractionDigits: 0 }).format(val || 0);
                return new Intl.NumberFormat('cs-CZ', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(val || 0);
            };

            // Zobrazení minimálního cíle na základě zvolené měny
            const formatMinTarget = (currency) => {
                if (currency === 'CZK') return '50 000 Kč';
                if (currency === 'HUF') return '775 000 HUF';
                return '2 000 €';
            };

            // VÝPOČTY PRO MOTIVAČNÍ PANEL (CELKOVÝ PLÁN)
            const globalRev = overviewStats.global.revEUR;
            const globalPct = globalTarget > 0 ? (globalRev / globalTarget) * 100 : 0;
            
            let nextMilestonePct = Math.ceil((globalPct + 0.1) / 10) * 10;
            if (nextMilestonePct > 100) nextMilestonePct = 100;
            const missingToNext = globalTarget > 0 ? ((nextMilestonePct / 100) * globalTarget) - globalRev : 0;

            // NEUTRÁLNÍ PRODEJNÍ MOTIVACE
            let motivation = { title: "Startujeme", text: "Měsíc začíná. Každý call a každá schůzka se počítá. Rozjeďme to!" };
            if (globalPct >= 100) motivation = { title: "🏆 CÍL SPLNĚN!", text: "Neskutečná práce! Plán je doma, jedeme pro rekordy!" };
            else if (globalPct >= 80) motivation = { title: "🔥 Jdeme do finále", text: "Poslední metry! Drtivý finiš, tohle už dotáhneme do konce." };
            else if (globalPct >= 60) motivation = { title: "⚡ Cílová rovinka", text: "Výborný výkon celého týmu. Plán je na dosah, nepolevujeme!" };
            else if (globalPct >= 40) motivation = { title: "🎯 Zvyšujeme obrátky", text: "Jsme v polovině. Skvělá práce, šlápneme do toho!" };
            else if (globalPct >= 20) motivation = { title: "💨 Nabíráme rychlost", text: "První dealy jsou doma. Držíme tempo a jdeme si pro další." };

            // TOP LÍDŘI (PRO SÍŇ SLÁVY)
            const topRepRev = salesData.length > 0 ? [...salesData].sort((a, b) => getValInEUR(b.rev, b.currency || 'EUR') - getValInEUR(a.rev, a.currency || 'EUR'))[0] : null;
            const topRepClients = salesData.length > 0 ? [...salesData].sort((a, b) => {
                const cA = Number(a.clients) || 0;
                const cB = Number(b.clients) || 0;
                if (cA === cB) return getValInEUR(b.rev, b.currency || 'EUR') - getValInEUR(a.rev, a.currency || 'EUR');
                return cB - cA;
            })[0] : null;

            const validTeams = overviewStats.teams.filter(t => t.id !== 'unassigned');
            const topTeamRev = validTeams.length > 0 ? [...validTeams].sort((a, b) => b.revEUR - a.revEUR)[0] : null;
            const topTeamClients = validTeams.length > 0 ? [...validTeams].sort((a, b) => {
                if (b.clients === a.clients) return b.revEUR - a.revEUR;
                return b.clients - a.clients;
            })[0] : null;


            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-12 h-12 border-4 border-slate-800 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Načítání přehledu...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-24 font-sans text-slate-900">
                    
                    {/* HORNÍ LIŠTA */}
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm px-4 py-3 sm:px-8">
                        <div className="max-w-[1600px] mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <img src="https://viewcz.com/images/svg/head-logo.svg" alt="VIEW CZ" className="h-8 sm:h-10" />
                                <div className="h-6 w-px bg-slate-200 hidden sm:block"></div>
                                <h1 className="text-lg font-black tracking-tight text-slate-800 uppercase flex items-center gap-2">
                                    Cíle a soutěže
                                </h1>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1600px] mx-auto p-4 sm:p-8 space-y-12">
                        
                        {view === 'rules' ? (
                            /* SEKCE PRAVIDEL (MS 2026) */
                            <div className="max-w-4xl mx-auto space-y-12 animate-in">
                                <div className="text-center pb-4 pt-8">
                                    <h1 className="text-4xl sm:text-6xl font-black text-slate-900 uppercase tracking-tighter italic mb-4">
                                        VIEW World<br/><span className="text-rose-600">Championship 2026</span>
                                    </h1>
                                    <p className="text-xl font-bold text-slate-500 uppercase tracking-widest">Společně na ledě: Síla, rychlost a týmová hra</p>
                                </div>

                                {/* Zpět tlačítko z pravidel */}
                                <div className="text-center">
                                    <button
                                        onClick={() => setView('board')}
                                        className="px-8 py-4 rounded-full font-black text-sm uppercase tracking-[0.2em] transition-all bg-slate-800 text-white hover:bg-slate-700 shadow-xl"
                                    >
                                        ← Zpět na výsledky a cíle
                                    </button>
                                </div>

                                {/* 1. ZLATÁ HELMA ZA OBRAT */}
                                <article className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
                                    <div className="bg-gradient-to-r from-amber-500 to-yellow-500 p-8 sm:p-12 text-slate-900">
                                        <h2 className="text-3xl sm:text-4xl font-black mb-2 tracking-tight flex items-center gap-3">
                                            <span className="text-4xl">👑</span> 1. Kategorie: Zlatá Helma
                                        </h2>
                                        <p className="opacity-80 font-bold uppercase tracking-widest text-sm">Soutěž o nejproduktivnější postavy celého šampionátu</p>
                                    </div>
                                    <div className="p-8 sm:p-12 space-y-10">
                                        <p className="text-xl text-slate-600 leading-relaxed italic border-l-4 border-amber-500 pl-6">
                                            Sčítáme body za celkový obrat a strategické bonusy za konkrétní prodané balíčky.
                                        </p>
                                        <section className="space-y-6">
                                            <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Odměny pro medailisty</h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 text-center shadow-sm">
                                                    <div className="text-3xl mb-2">🥈</div>
                                                    <div className="text-slate-500 font-bold text-sm uppercase tracking-widest mb-1">2. Místo</div>
                                                    <div className="text-2xl font-black text-slate-700">150 €</div>
                                                </div>
                                                <div className="bg-amber-50 border-2 border-amber-300 rounded-2xl p-6 text-center shadow-md transform sm:-translate-y-4">
                                                    <div className="text-4xl mb-2">🥇</div>
                                                    <div className="text-amber-600 font-black text-sm uppercase tracking-widest mb-1">Mistr VIEW</div>
                                                    <div className="text-3xl font-black text-amber-700">250 €</div>
                                                </div>
                                                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6 text-center shadow-sm">
                                                    <div className="text-3xl mb-2">🥉</div>
                                                    <div className="text-slate-500 font-bold text-sm uppercase tracking-widest mb-1">3. Místo</div>
                                                    <div className="text-2xl font-black text-slate-700">50 €</div>
                                                </div>
                                            </div>

                                            <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tighter pt-8">Pravidla bodování</h3>
                                            <div className="overflow-x-auto rounded-3xl border border-slate-200 shadow-sm">
                                                <table className="w-full text-left min-w-[600px]">
                                                    <thead className="bg-slate-100">
                                                        <tr>
                                                            <th className="p-5 font-black text-slate-500 uppercase text-[10px] tracking-widest w-1/2">Výkon na ledě</th>
                                                            <th className="p-5 font-black text-slate-500 uppercase text-[10px] tracking-widest text-right">Zisk VIEW Bodů</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100 text-slate-700 bg-white">
                                                        <tr className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-5 font-bold text-slate-800">Základní obrat</td>
                                                            <td className="p-5 font-black text-blue-600 text-right">1 EUR = 1 bod / 25 CZK = 1 bod</td>
                                                        </tr>
                                                        <tr className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-5 font-bold text-slate-800">Bonus za Package MINI</td>
                                                            <td className="p-5 font-black text-emerald-600 text-right">+ 20 bodů</td>
                                                        </tr>
                                                        <tr className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-5 font-bold text-slate-800">Bonus za Package BASIC</td>
                                                            <td className="p-5 font-black text-emerald-600 text-right">+ 50 bodů</td>
                                                        </tr>
                                                        <tr className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-5 font-bold text-slate-800">Bonus za Package PROFESSIONAL</td>
                                                            <td className="p-5 font-black text-emerald-600 text-right">+ 150 bodů</td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </section>
                                    </div>
                                </article>

                                {/* 2. TÝDENNÍ HAT-TRICK */}
                                <article className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
                                    <div className="bg-gradient-to-r from-rose-700 to-red-600 p-8 sm:p-12 text-white">
                                        <h2 className="text-3xl sm:text-4xl font-black mb-2 tracking-tight flex items-center gap-3">

                                                                    <div>
                                                                        <label className="text-[9px] font-bold uppercase text-amber-500 block mb-1 text-center">Basic (50b)</label>
                                                                        <input type="number" value={rep.pkgBasic} onChange={(e) => updateRep(rep.id, 'pkgBasic', e.target.value)} className="w-full p-2 bg-white border border-amber-200 rounded-lg font-bold text-slate-700 text-center outline-none focus:border-amber-400 shadow-sm" />
                                                                    </div>
                                                                    <div>
                                                                        <label className="text-[9px] font-bold uppercase text-amber-500 block mb-1 text-center">Pro (150b)</label>
                                                                        <input type="number" value={rep.pkgPro} onChange={(e) => updateRep(rep.id, 'pkgPro', e.target.value)} className="w-full p-2 bg-white border border-amber-200 rounded-lg font-bold text-slate-700 text-center outline-none focus:border-amber-400 shadow-sm" />
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}

                                {/* NEZAŘAZENÍ OBCHODNÍCI */}
                                {salesData.filter(r => !availableTeams.some(t => t.id === r.teamId)).length > 0 && (
                                    <div className="mb-12 border-t-4 border-slate-300 pt-8 mt-12">
                                        <h3 className="text-2xl font-black text-slate-400 uppercase tracking-tighter mb-6">Nezařazení hráči (Bez týmu)</h3>
                                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-8 opacity-75 hover:opacity-100 transition-opacity">
                                            {salesData.filter(r => !availableTeams.some(t => t.id === r.teamId)).map(rep => (
                                                <div key={`admin-rep-${rep.id}`} className="bg-white p-6 rounded-[2rem] border-2 border-slate-200 relative shadow-sm group">
                                                    <button onClick={() => setRepToDelete(rep.id)} className="absolute top-4 right-4 text-rose-300 opacity-0 group-hover:opacity-100 transition-opacity p-2 hover:text-rose-600 font-bold text-xl">✕</button>
                                                    
                                                    <div className="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-5 pr-8">
                                                        <div className="sm:col-span-1">
                                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-2 tracking-[0.1em]">Jméno Hráče</label>
                                                            <input type="text" value={rep.name} onChange={(e) => updateRep(rep.id, 'name', e.target.value)} className="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl font-bold text-slate-800 focus:border-slate-500 outline-none transition-all shadow-inner" />
                                                        </div>
                                                        <div className="sm:col-span-1">
                                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-2 tracking-[0.1em]">URL Fotografie</label>
                                                            <input type="text" value={rep.photoUrl || ''} onChange={(e) => updateRep(rep.id, 'photoUrl', e.target.value)} placeholder="https://..." className="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl font-medium text-slate-600 focus:border-slate-500 outline-none transition-all shadow-inner text-xs" />
                                                        </div>
                                                        <div className="sm:col-span-1">
                                                            <label className="text-[10px] font-black uppercase text-blue-500 block mb-2 tracking-[0.1em]">Přestup (Tým)</label>
                                                            <select value={rep.teamId || ''} onChange={(e) => updateRep(rep.id, 'teamId', e.target.value)} className="w-full p-3 bg-blue-50 border-2 border-blue-200 rounded-xl font-bold text-blue-800 focus:border-blue-500 outline-none transition-all shadow-inner cursor-pointer appearance-none">
                                                                <option value="">-- Vyberte tým --</option>
                                                                {availableTeams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                                            </select>
                                                        </div>
                                                        <div className="sm:col-span-1">
                                                            <label className="text-[10px] font-black uppercase text-blue-500 block mb-2 tracking-[0.1em]">Měna hráče</label>
                                                            <select value={rep.currency || 'EUR'} onChange={(e) => updateRep(rep.id, 'currency', e.target.value)} className="w-full p-3 bg-blue-50 border-2 border-blue-200 rounded-xl font-bold text-blue-800 focus:border-blue-500 outline-none transition-all shadow-inner cursor-pointer appearance-none">
                                                                <option value="EUR">€ (EUR)</option>
                                                                <option value="CZK">Kč (CZK)</option>
                                                                <option value="HUF">HUF</option>
                                                            </select>
                                                        </div>
                                                    </div>

                                                    <div className="grid grid-cols-2 gap-6 border-t border-slate-100 pt-5 mb-5">
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Osobní Cíl (Plán)</label>
                                                            <input type="number" value={rep.target} onChange={(e) => updateRep(rep.id, 'target', e.target.value)} className="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl font-black text-slate-700 focus:border-slate-400 outline-none shadow-inner" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Obrat (čistý)</label>
                                                            <input type="number" value={rep.rev} onChange={(e) => updateRep(rep.id, 'rev', e.target.value)} className="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl font-black text-emerald-600 focus:border-emerald-400 outline-none shadow-inner" />
                                                        </div>
                                                    </div>

                                                    {/* DATA PRO SOUTĚŽE */}
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                        <h4 className="font-black text-slate-800 text-xs uppercase tracking-widest mb-4">Hodnoty pro MS 2026</h4>
                                                        <div className="grid grid-cols-4 gap-3">
                                                            <div>
                                                                <label className="text-[9px] font-bold uppercase text-rose-500 block mb-1 text-center">Nové Klienty</label>
                                                                <input type="number" value={rep.clients} onChange={(e) => updateRep(rep.id, 'clients', e.target.value)} className="w-full p-2 bg-white border border-rose-200 rounded-lg font-black text-rose-600 text-center outline-none focus:border-rose-400 shadow-sm" />
                                                            </div>
                                                            <div>
                                                                <label className="text-[9px] font-bold uppercase text-amber-500 block mb-1 text-center">Mini (20b)</label>
                                                                <input type="number" value={rep.pkgMini} onChange={(e) => updateRep(rep.id, 'pkgMini', e.target.value)} className="w-full p-2 bg-white border border-amber-200 rounded-lg font-bold text-slate-700 text-center outline-none focus:border-amber-400 shadow-sm" />
                                                            </div>
                                                            <div>
                                                                <label className="text-[9px] font-bold uppercase text-amber-500 block mb-1 text-center">Basic (50b)</label>
                                                                <input type="number" value={rep.pkgBasic} onChange={(e) => updateRep(rep.id, 'pkgBasic', e.target.value)} className="w-full p-2 bg-white border border-amber-200 rounded-lg font-bold text-slate-700 text-center outline-none focus:border-amber-400 shadow-sm" />
                                                            </div>
                                                            <div>
                                                                <label className="text-[9px] font-bold uppercase text-amber-500 block mb-1 text-center">Pro (150b)</label>
                                                                <input type="number" value={rep.pkgPro} onChange={(e) => updateRep(rep.id, 'pkgPro', e.target.value)} className="w-full p-2 bg-white border border-amber-200 rounded-lg font-bold text-slate-700 text-center outline-none focus:border-amber-400 shadow-sm" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="h-32" />
                            </div>
                        </div>
                    )}

                    {/* MODAL MAZÁNÍ */}
                    {repToDelete && (
                        <div className="fixed inset-0 bg-slate-900/90 flex items-center justify-center z-[110] p-4 backdrop-blur-md">
                            <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl text-center border border-slate-200">
                                <h3 className="text-2xl font-black mb-4 text-slate-800 uppercase tracking-tighter">Vyřadit hráče?</h3>
                                <p className="text-slate-500 mb-10 font-medium">Opravdu chcete tohoto obchodníka smazat ze všech plánů a soutěží?</p>
                                <div className="flex gap-4 font-black uppercase text-[10px] tracking-widest">
                                    <button onClick={() => setRepToDelete(null)} className="flex-1 py-5 text-slate-400 hover:text-slate-600 transition-colors">Zrušit</button>
                                    <button onClick={deleteRep} className="flex-1 py-5 bg-rose-600 text-white rounded-[1.5rem] shadow-xl shadow-rose-200 transition-transform active:scale-95">Smazat</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
