<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Průběžné výsledky - VIEW CZ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel pro JSX v prohlížeči -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-900 font-sans">
    <div id="root"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURACE ---
        // DŮLEŽITÉ: Pro funkčnost na GitHubu musíte vyplnit údaje ze své Firebase Console
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
            apiKey: "", 
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'view-cz-competition-2026';

        // Kontrola, zda jsou vyplněny klíče
        const isConfigValid = firebaseConfig.apiKey && firebaseConfig.projectId;

        let app, auth, db;
        if (isConfigValid || window.__firebase_config) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        // Export do okna pro Babel
        window.FirebaseServices = { 
            auth, db, appId, doc, onSnapshot, setDoc, 
            signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            isConfigValid: !!(isConfigValid || window.__firebase_config)
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            auth, db, appId, doc, onSnapshot, setDoc, 
            signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            isConfigValid
        } = window.FirebaseServices || {};

        const defaultData = [
            { id: '1', name: 'Jan Novák', nfc: 8, rev: 145000 },
            { id: '2', name: 'Petr Svoboda', nfc: 4, rev: 45000 },
            { id: '3', name: 'Lucie Černá', nfc: 12, rev: 210000 },
            { id: '4', name: 'Karel Dvořák', nfc: 6, rev: 120000 },
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [salesData, setSalesData] = useState([]);
            const [view, setView] = useState('board');
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminPin, setAdminPin] = useState('');
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinError, setPinError] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [authError, setAuthError] = useState(false);
            const [repToDelete, setRepToDelete] = useState(null);

            // 1. Inicializace přihlášení
            useEffect(() => {
                if (!isConfigValid || !auth) {
                    setIsLoading(false);
                    return;
                }
                
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                        setAuthError(true);
                        setIsLoading(false);
                    }
                };

                initAuth();
                const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (!u) setIsLoading(false); // Pokud se odhlásí, přestaň načítat
                });
                return () => unsubscribeAuth();
            }, []);

            // 2. Načítání dat z Firestore (pouze pokud je uživatel přihlášen)
            useEffect(() => {
                if (!user || !db) return;
                
                setIsLoading(true);
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'sales_competition', 'main_state');
                
                const unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setSalesData(docSnap.data().users || []);
                    } else {
                        // Pokud neexistuje, vytvoř s výchozími daty
                        setDoc(docRef, { users: defaultData }).catch(e => console.error("setDoc fail:", e));
                        setSalesData(defaultData);
                    }
                    setIsLoading(false);
                }, (error) => {
                    console.error("Firestore error:", error);
                    setIsLoading(false);
                    // Pokud je chyba oprávnění, ukážeme aspoň defaulty pro demo
                    if (salesData.length === 0) setSalesData(defaultData);
                });

                return () => unsubscribeSnapshot();
            }, [user]);

            const saveToDb = async (newData) => {
                if (!user || !db) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'sales_competition', 'main_state');
                    await setDoc(docRef, { users: newData });
                } catch (error) { 
                    console.error("Save error:", error); 
                }
            };

            const handlePinSubmit = (e) => {
                e.preventDefault();
                if (adminPin === '2026') {
                    setIsAdmin(true);
                    setShowPinModal(false);
                    setAdminPin('');
                    setPinError('');
                } else {
                    setPinError('Nesprávný PIN. (Zkuste 2026)');
                }
            };

            const updateRep = (id, field, value) => {
                const numValue = field === 'name' ? value : Number(value);
                const newData = salesData.map(rep => rep.id === id ? { ...rep, [field]: numValue } : rep);
                setSalesData(newData);
                saveToDb(newData);
            };

            const addRep = () => {
                const newRep = { id: Date.now().toString(), name: 'Nový Obchodník', nfc: 0, rev: 0 };
                const newData = [...salesData, newRep];
                setSalesData(newData);
                saveToDb(newData);
            };

            const executeDelete = () => {
                if (repToDelete) {
                    const newData = salesData.filter(rep => rep.id !== repToDelete);
                    setSalesData(newData);
                    saveToDb(newData);
                    setRepToDelete(null);
                }
            };

            const sortedNFC = useMemo(() => [...salesData].sort((a, b) => b.nfc - a.nfc), [salesData]);
            const sortedRev = useMemo(() => [...salesData].sort((a, b) => b.rev - a.rev), [salesData]);

            const formatCZK = (value) => new Intl.NumberFormat('cs-CZ', { style: 'currency', currency: 'CZK', maximumFractionDigits: 0 }).format(value);

            // Stav: Chybějící konfigurace
            if (!isConfigValid) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 p-6 text-center">
                        <div className="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 max-w-md">
                            <span className="text-5xl mb-4 block">⚠️</span>
                            <h2 className="text-2xl font-bold mb-4">Chybí konfigurace Firebase</h2>
                            <p className="text-slate-600 mb-6 text-sm">
                                Pro zprovoznění na GitHubu musíte v souboru <code>index.html</code> vyplnit objekt <code>firebaseConfig</code> údaji z vašeho Firebase projektu.
                            </p>
                            <div className="bg-slate-900 text-slate-300 p-4 rounded-lg text-left text-xs font-mono overflow-x-auto">
                                apiKey: "VAŠE_API_KEY",<br/>
                                projectId: "VÁŠ_PROJEKT_ID",<br/>
                                ...
                            </div>
                        </div>
                    </div>
                );
            }

            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-600">
                        <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
                        <p className="text-xl font-medium tracking-tight">Připojování k databázi...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-100 text-slate-900 font-sans pb-20">
                    <header className="bg-white border-b border-slate-200 p-4 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-[1600px] mx-auto flex flex-wrap justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src="https://viewcz.com/images/svg/head-logo.svg" alt="VIEW CZ" className="h-9 object-contain" />
                                <div className="h-6 w-px bg-slate-200 hidden sm:block"></div>
                                <h1 className="text-xl font-bold tracking-tight text-slate-800">Průběžné výsledky</h1>
                            </div>
                            <div className="flex items-center gap-2">
                                {!user && <span className="text-[10px] bg-amber-100 text-amber-700 px-2 py-1 rounded font-bold uppercase">Nepřihlášen</span>}
                                <button
                                    onClick={() => setView(view === 'board' ? 'rules' : 'board')}
                                    className={`px-6 py-2 rounded-full font-bold text-sm transition-all flex items-center gap-2 border shadow-sm hover:scale-105 active:scale-95 ${
                                        view === 'rules' ? 'bg-blue-600 text-white border-blue-700' : 'bg-white text-slate-700 border-slate-200'
                                    }`}
                                >
                                    {view === 'rules' ? '✕ Zpět na výsledky' : '📖 Pravidla a odměny'}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1600px] mx-auto p-4 sm:p-6">
                        {view === 'rules' ? (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                {/* Hra o obrat */}
                                <article className="bg-white border border-slate-200 rounded-2xl shadow-xl overflow-hidden">
                                    <div className="bg-emerald-600 p-8 text-white">
                                        <h2 className="text-3xl font-black mb-2">Dubnová výzva: Hra o obrat</h2>
                                        <p className="text-emerald-100 font-bold text-lg">Období soutěže: 01. 04. – 01. 05. 2026</p>
                                    </div>
                                    <div className="p-8 sm:p-12 space-y-8 text-sm sm:text-base">
                                        <div className="text-lg text-slate-700 leading-relaxed border-l-4 border-emerald-500 pl-6 py-2 italic">
                                            Týme, k týdenním NFC bleskovkám přidáváme hlavní měsíční soutěž. Tato výzva je zaměřena na váš celkový obrat a má vás motivovat k dosažení vyšších provizních hladin.
                                        </div>
                                        <section>
                                            <h3 className="text-xl font-black text-slate-800 mb-4">🏆 Odměny pro TOP 3 obchodníky</h3>
                                            <div className="overflow-x-auto rounded-xl border border-slate-100">
                                                <table className="w-full text-left border-collapse">
                                                    <thead className="bg-slate-50">
                                                        <tr><th className="p-4 font-bold text-slate-500 uppercase text-[10px]">Umístění</th><th className="p-4 font-bold text-slate-500 uppercase text-[10px]">CZK</th><th className="p-4 font-bold text-slate-500 uppercase text-[10px]">EUR</th><th className="p-4 font-bold text-slate-500 uppercase text-[10px]">HUF</th></tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        <tr className="bg-amber-50/30"><td className="p-4 font-bold">🥇 1. místo</td><td className="p-4 font-black">5 000 Kč</td><td className="p-4">200 €</td><td className="p-4">77 500 HUF</td></tr>
                                                        <tr><td className="p-4 font-bold">🥈 2. místo</td><td className="p-4 font-black">3 000 Kč</td><td className="p-4">120 €</td><td className="p-4">46 500 HUF</td></tr>
                                                        <tr className="bg-orange-50/30"><td className="p-4 font-bold">🥉 3. místo</td><td className="p-4 font-black">1 000 Kč</td><td className="p-4">40 €</td><td className="p-4">15 500 HUF</td></tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </section>
                                        <section className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="bg-slate-50 p-8 rounded-2xl border border-slate-100">
                                                <h3 className="text-lg font-black text-slate-800 mb-4">🎯 Pravidla a podmínky</h3>
                                                <ul className="space-y-4 text-slate-700">
                                                    <li><strong>Období:</strong> Uzavřené objednávky od pondělí 01. 04. do pátku 01. 05. 2026.</li>
                                                    <li><strong>Kvalifikace:</strong> Nutné dosáhnout minimálního obratu <strong>50 000 Kč</strong> / 2 000 € / 775 000 HUF.</li>
                                                </ul>
                                            </div>
                                            <div className="bg-emerald-600 p-8 rounded-2xl text-white shadow-lg">
                                                <h3 className="text-xl font-black mb-4">🚀 Hlavní meta: Provize 25 %</h3>
                                                <p className="">Při překonání obratu 250 000 Kč / 10 000 € / 3 875 000 HUF dochází k navýšení vaší provize z 20 % na <strong>25 %</strong>.</p>
                                            </div>
                                        </section>
                                        <div className="text-center py-6 text-slate-400 font-bold text-xl">Šlápněte do toho, jdeme na to! 💪😎</div>
                                    </div>
                                </article>

                                {/* NFC Král */}
                                <article className="bg-white border border-slate-200 rounded-2xl shadow-xl overflow-hidden">
                                    <div className="bg-blue-700 p-8 text-white">
                                        <h2 className="text-3xl font-black mb-2">NFC Král týdne</h2>
                                        <p className="text-blue-100 font-bold text-lg">Duben - Startujeme od 13.04.2026</p>
                                    </div>
                                    <div className="p-8 sm:p-12 space-y-8">
                                        <p className="text-lg text-slate-700 leading-relaxed">Rychlá a přímočará soutěž na NFC produkty. Pravidla jsou jednoduchá, odměny okamžité. Žádné složité vzorce.</p>
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                            <section className="space-y-4">
                                                <div className="bg-blue-50 border-l-4 border-blue-600 p-4 font-bold text-blue-900">Cíl: Nejvíce kusů NFC v týdnu.</div>
                                                <div className="space-y-2 text-sm">
                                                  <div className="p-3 bg-slate-50 rounded-lg"><strong>Pravidlo:</strong> Absolutně nejvyšší počet kusů vyhrává.</div>
                                                  <div className="p-3 bg-slate-50 rounded-lg"><strong>Kvalifikace:</strong> Minimum 6 kusů za týden.</div>
                                                  <div className="p-3 bg-blue-100 rounded-lg font-bold"><strong>Odměna:</strong> 1 000 Kč / 40 € / 15 500 HUF.</div>
                                                </div>
                                            </section>
                                            <section>
                                                <h3 className="font-bold mb-4">📅 Harmonogram kol</h3>
                                                <table className="w-full text-sm border-collapse rounded-lg overflow-hidden border border-slate-100">
                                                    <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-500">
                                                        <tr><th className="p-3">Kolo</th><th className="p-3">Období</th><th className="p-3">Odměna</th></tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        <tr><td className="p-3 font-bold">1. kolo</td><td className="p-3">13. 4. – 19. 4.</td><td className="p-3 font-bold">1 000 Kč</td></tr>
                                                        <tr><td className="p-3 font-bold">2. kolo</td><td className="p-3">20. 4. – 26. 4.</td><td className="p-3 font-bold">1 000 Kč</td></tr>
                                                        <tr className="bg-blue-50"><td className="p-3 font-bold text-blue-700">3. kolo</td><td className="p-3 text-blue-700">27. 4. – 30. 4.</td><td className="p-3 font-bold text-blue-700">1 000 Kč</td></tr>
                                                    </tbody>
                                                </table>
                                            </section>
                                        </div>
                                        <div className="text-center py-4 text-2xl font-black text-blue-600 italic">Startujeme v pondělí 13. dubna! 🔥</div>
                                    </div>
                                </article>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 xl:grid-cols-2 gap-8 animate-in fade-in duration-500">
                                {/* NFC BOARD */}
                                <section className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-lg flex flex-col">
                                    <div className="bg-gradient-to-r from-blue-700 to-blue-500 p-6 text-white">
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <h2 className="text-xl font-black uppercase tracking-tight">🏆 NFC Král týdne</h2>
                                                <p className="text-blue-100 text-[10px] mt-1 uppercase font-bold tracking-widest">Týdenní prodeje</p>
                                            </div>
                                            <span className="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">MIN 6 KS</span>
                                        </div>
                                    </div>
                                    <div className="divide-y divide-slate-100 flex-grow">
                                        {sortedNFC.map((rep, index) => {
                                            const isQual = rep.nfc >= 6;
                                            const maxVal = Math.max(...salesData.map(r => r.nfc), 10);
                                            const progress = (rep.nfc / maxVal) * 100;
                                            return (
                                                <div key={`nfc-${rep.id}`} className={`p-5 flex items-center gap-4 ${index === 0 ? 'bg-blue-50/30' : 'hover:bg-slate-50/50'}`}>
                                                    <div className="w-8 text-center font-black text-slate-300 text-lg">{index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : index + 1}</div>
                                                    <div className="flex-grow">
                                                        <div className="flex justify-between font-bold mb-1">
                                                            <span className="text-slate-800 text-lg">{rep.name}</span>
                                                            <span className="text-blue-600 text-xl font-black">{rep.nfc} KS</span>
                                                        </div>
                                                        <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                                            <div className={`h-full transition-all duration-1000 ${isQual ? 'bg-blue-500' : 'bg-slate-300'}`} style={{ width: `${progress}%` }}></div>
                                                        </div>
                                                        <div className={`text-[10px] font-black uppercase mt-1 tracking-wider ${isQual ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                            {isQual ? '✓ Kvalifikován' : `Chybí ${6 - rep.nfc} ks`}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>

                                {/* REVENUE BOARD */}
                                <section className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-lg flex flex-col">
                                    <div className="bg-gradient-to-r from-emerald-700 to-emerald-500 p-6 text-white">
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <h2 className="text-xl font-black uppercase tracking-tight">🎯 Hra o obrat</h2>
                                                <p className="text-emerald-100 text-[10px] mt-1 uppercase font-bold tracking-widest">Měsíční progres</p>
                                            </div>
                                            <span className="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">CÍL 250K</span>
                                        </div>
                                    </div>
                                    <div className="divide-y divide-slate-100 flex-grow">
                                        {sortedRev.map((rep, index) => {
                                            const isQual = rep.rev >= 50000;
                                            const isBonus = rep.rev >= 250000;
                                            const progress = Math.min((rep.rev / 250000) * 100, 100);
                                            return (
                                                <div key={`rev-${rep.id}`} className={`p-5 flex items-center gap-4 ${index === 0 ? 'bg-emerald-50/30' : 'hover:bg-slate-50/50'}`}>
                                                    <div className="w-8 text-center font-black text-slate-300 text-lg">{index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : index + 1}</div>
                                                    <div className="flex-grow">
                                                        <div className="flex justify-between font-bold mb-1">
                                                            <span className="text-slate-800 text-lg">{rep.name}</span>
                                                            <span className="text-emerald-600 text-xl font-black">{formatCZK(rep.rev)}</span>
                                                        </div>
                                                        <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                                            <div className={`h-full transition-all duration-1000 ${isBonus ? 'bg-emerald-500' : 'bg-emerald-400'}`} style={{ width: `${progress}%` }}></div>
                                                        </div>
                                                        <div className="flex justify-between text-[10px] font-black uppercase mt-1 tracking-wider">
                                                            <span className={isQual ? 'text-emerald-600' : 'text-rose-500'}>{isBonus ? '✨ 25% Provize!' : isQual ? '✓ Kvalifikován' : '⚠️ Pod limitem'}</span>
                                                            <span className="text-slate-400">Target 250k</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {/* Admin ovládání */}
                    <button 
                        onClick={() => isAdmin ? setIsAdmin(false) : setShowPinModal(true)}
                        className={`fixed bottom-6 right-6 px-6 py-3 rounded-full font-bold shadow-lg transition-all z-50 border ${
                            isAdmin ? 'bg-rose-600 text-white border-rose-700' : 'bg-white text-slate-700 border-slate-200 hover:scale-105 active:scale-95'
                        }`}
                    >
                        {isAdmin ? '✕ Zavřít administraci' : '⚙️ Správa výsledků'}
                    </button>

                    {/* Modaly a Editor */}
                    {showPinModal && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] backdrop-blur-sm p-4 text-sm">
                            <div className="bg-white p-8 rounded-2xl border border-slate-200 w-full max-w-sm shadow-2xl">
                                <h3 className="text-lg font-bold mb-4">Admin PIN</h3>
                                <form onSubmit={handlePinSubmit}>
                                    <input type="password" value={adminPin} onChange={(e) => {setAdminPin(e.target.value); setPinError('');}} placeholder="2026" className="w-full p-3 mb-2 bg-slate-50 border border-slate-200 rounded-xl font-bold" autoFocus />
                                    {pinError && <div className="text-rose-500 text-xs font-bold mb-4">{pinError}</div>}
                                    <div className="flex gap-3 justify-end font-bold uppercase text-[10px] tracking-widest">
                                        <button type="button" onClick={() => setShowPinModal(false)} className="px-4 py-2 text-slate-400">Zrušit</button>
                                        <button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded-xl">Vstoupit</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {repToDelete && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[110] p-4 text-sm">
                            <div className="bg-white p-8 rounded-2xl w-full max-w-sm">
                                <h3 className="text-lg font-bold mb-6">Smazat obchodníka?</h3>
                                <div className="flex gap-3 justify-end font-bold uppercase text-[10px] tracking-widest">
                                    <button onClick={() => setRepToDelete(null)} className="px-4 py-2 text-slate-400">Zpět</button>
                                    <button onClick={executeDelete} className="px-6 py-2 bg-rose-600 text-white rounded-xl">Smazat</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isAdmin && (
                        <div className="fixed bottom-0 left-0 right-0 h-[50vh] bg-white border-t border-slate-200 p-6 overflow-y-auto z-40 shadow-2xl animate-in slide-in-from-bottom duration-300">
                            <div className="max-w-[1600px] mx-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black uppercase tracking-tighter">⚙️ Editor výsledků</h2>
                                    <button onClick={addRep} className="px-4 py-2 bg-emerald-600 text-white rounded-lg font-bold text-[10px] uppercase tracking-widest shadow-md shadow-emerald-100">+ Přidat obchodníka</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {salesData.map(rep => (
                                        <div key={`admin-${rep.id}`} className="bg-slate-50 p-4 rounded-xl border border-slate-200 relative group">
                                            <button onClick={() => setRepToDelete(rep.id)} className="absolute top-2 right-2 text-rose-500 font-bold opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                                            <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Obchodník</label>
                                            <input type="text" value={rep.name} onChange={(e) => updateRep(rep.id, 'name', e.target.value)} className="w-full p-2 mb-3 bg-white border border-slate-200 rounded text-xs font-bold" />
                                            <div className="grid grid-cols-2 gap-2 text-[10px] font-black uppercase text-slate-400">
                                                <div>
                                                    <span className="block mb-1 text-blue-500">NFC (ks)</span>
                                                    <input type="number" value={rep.nfc} onChange={(e) => updateRep(rep.id, 'nfc', e.target.value)} className="w-full p-1.5 border border-slate-200 rounded" />
                                                </div>
                                                <div>
                                                    <span className="block mb-1 text-emerald-500">Obrat (Kč)</span>
                                                    <input type="number" value={rep.rev} onChange={(e) => updateRep(rep.id, 'rev', e.target.value)} className="w-full p-1.5 border border-slate-200 rounded" />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
