<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manažerský Pipedrive Report</title>
    
    <!-- Tailwind CSS (pro prémiový vzhled) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Knihovna pro čtení Excel/CSV souborů (Bezpečná CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        body { 
            background-color: #f8fafc; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen pb-16">

    <!-- NOTIFIKAČNÍ PANEL -->
    <div id="notification-container" class="fixed top-5 right-5 z-50 pointer-events-none"></div>

    <!-- HLAVNÍ STRUKTURA STRÁNKY -->
    <div id="app">
        <!-- HORNÍ LIŠTA -->
        <header class="bg-slate-900 text-white py-5 px-6 md:px-12 shadow-md mb-8">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-emerald-500 rounded-lg text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">Manažerský Pipedrive Report</h1>
                        <p class="text-xs text-slate-400">Okamžitá vizualizace obchodních výsledků a pipeline</p>
                    </div>
                </div>

                <div id="header-actions" class="flex items-center gap-3">
                    <!-- Tlačítka se doplní dynamicky podle stavu dat -->
                </div>
            </div>
        </header>

        <!-- HLAVNÍ OBSAH -->
        <main id="main-content" class="max-w-7xl mx-auto px-4 md:px-8">
            <!-- Sem se bude vykreslovat rozhraní -->
        </main>
    </div>

    <!-- ČISTÝ JAVASCRIPT BEZ NUTNOSTI KOMPILACE -->
    <script>
        // --- STAV APLIKACE (State) ---
        const state = {
            deals: [],
            activeTab: 'dashboard',
            searchTerm: '',
            ownerFilter: 'all', // Bude obsahovat 'all' nebo index vlastníka (string) pro odolnost vůči překladačům
            statusFilter: 'all',
            dragActive: false
        };

        // --- IKONY V SVG FORMÁTU ---
        const Icons = {
            Upload: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>',
            BarChart: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>',
            Users: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
            FileSpreadsheet: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>',
            Dollar: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="1" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
            TrendingUp: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>',
            Search: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
            Refresh: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>',
            Info: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y1="12"/><line x1="12" y1="8" x2="12.01" y1="8"/></svg>',
            CheckCircle: '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
        };

        // --- UKÁZKOVÁ VZOROVÁ DATA (Se zástupci CZK, EUR a HUF) ---
        const SAMPLE_DATA = [
            { "Deal - Název": "AeroSpace s.r.o. - Implementace ERP", "Deal - Hodnota": "350000 CZK", "Deal - Obchodník": "Jan Novák", "Deal - Fáze": "SIGNED ORDER", "Deal - Stav": "open", "Deal - Operátor": "Knebelová Ivana" },
            { "Deal - Název": "TechSolutions a.s. - Roční licence cloud", "Deal - Hodnota": "4800 EUR", "Deal - Obchodník": "Marie Svobodová", "Deal - Fáze": "PAID", "Deal - Stav": "won", "Deal - Operátor": "Tiefenbachová Michaela" },
            { "Deal - Název": "SolarPower Group - Dodávka fotovoltaiky", "Deal - Hodnota": "850000 CZK", "Deal - Obchodník": "Petr Černý", "Deal - Fáze": "MEETING ARRANGED", "Deal - Stav": "open", "Deal - Operátor": "Kratochvílová Pavla" },
            { "Deal - Název": "E-commerce Hub - SEO & PPC kampaň", "Deal - Hodnota": "45000 CZK", "Deal - Obchodník": "Jana Kučerová", "Deal - Fáze": "IN PROCESS", "Deal - Stav": "won", "Deal - Operátor": "Sýkorová Petra" },
            { "Deal - Název": "Prague Logistics - Fleet management HW", "Deal - Hodnota": "25000 EUR", "Deal - Obchodník": "Pavel Dvořák", "Deal - Fáze": "MEETING ARRANGED", "Deal - Stav": "lost", "Deal - Operátor": "Zug Zuzana" },
            { "Deal - Název": "Budapest Trade - Distribuce licencí", "Deal - Hodnota": "8.500.000 HUF", "Deal - Obchodník": "Vebrová Dagmar", "Deal - Fáze": "CONDITIONS SENT", "Deal - Stav": "won", "Deal - Operátor": "Knebelová Ivana" },
            { "Deal - Název": "Stavby Praha - Revize zabezpečení", "Deal - Hodnota": "180000 CZK", "Deal - Obchodník": "Marie Svobodová", "Deal - Fáze": "ORDER SENT", "Deal - Stav": "open", "Deal - Operátor": "Kratochvílová Pavla" }
        ];

        // --- POMOCNÉ FORMÁTOVÁNÍ MĚNY ---
        const formatCZK = (num) => {
            return new Intl.NumberFormat('cs-CZ', { style: 'currency', currency: 'CZK', maximumFractionDigits: 0 }).format(num);
        };

        // --- FORMÁTOVÁNÍ MULTI-MĚNOVÝCH HODNOT PRO MANAŽERSKÉ PŘEHLEDY ---
        const formatMultiCurrency = (currMap, consolidatedCzk = null) => {
            const parts = [];
            
            // Formát CZK
            if (currMap.CZK && currMap.CZK > 0) {
                parts.push(new Intl.NumberFormat('cs-CZ', { style: 'currency', currency: 'CZK', maximumFractionDigits: 0 }).format(currMap.CZK));
            }
            // Formát EUR
            if (currMap.EUR && currMap.EUR > 0) {
                parts.push(new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(currMap.EUR));
            }
            // Formát HUF
            if (currMap.HUF && currMap.HUF > 0) {
                parts.push(new Intl.NumberFormat('hu-HU', { style: 'currency', currency: 'HUF', maximumFractionDigits: 0 }).format(currMap.HUF));
            }
            
            if (parts.length === 0) return '0 Kč';
            
            const joinedOriginals = parts.join(' + ');
            
            const keys = Object.keys(currMap).filter(k => currMap[k] > 0);
            if (keys.length === 1 && keys[0] === 'CZK') {
                return joinedOriginals;
            }
            
            if (consolidatedCzk !== null && consolidatedCzk > 0) {
                return `${joinedOriginals} <span class="text-[11px] text-slate-400 block font-normal">(~${formatCZK(consolidatedCzk)})</span>`;
            }
            
            return joinedOriginals;
        };

        // --- FORMÁTOVÁNÍ PŮVODNÍ ČÁSTKY S PŘEPOČTEM PRO SEZNAM OBCHODŮ ---
        const formatOriginalValue = (deal) => {
            if (deal.originalCurrency && deal.originalCurrency !== 'CZK') {
                let formattedOrig = '';
                if (deal.originalCurrency === 'EUR') {
                    formattedOrig = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(deal.originalValue);
                } else if (deal.originalCurrency === 'HUF') {
                    formattedOrig = new Intl.NumberFormat('hu-HU', { style: 'currency', currency: 'HUF', maximumFractionDigits: 0 }).format(deal.originalValue);
                } else {
                    formattedOrig = `${deal.originalValue} ${deal.originalCurrency}`;
                }
                return `${formattedOrig} <span class="text-[11px] text-slate-400 block md:inline md:ml-1">(~${formatCZK(deal.value)})</span>`;
            }
            return formatCZK(deal.value);
        };

        // --- ZOBRAZENÍ NOTIFIKACÍ ---
        const showNotification = (message, type = 'success') => {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `mb-3 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 text-white font-medium transition duration-300 transform translate-y-2 opacity-0 pointer-events-auto ${
                type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-rose-600' : 'bg-blue-600'
            }`;
            toast.innerHTML = `
                ${Icons.CheckCircle}
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        };

        // --- DEFINICE KLÍČOVÝCH FÁZÍ PODLE POŽADAVKU UŽIVATELE ---
        const isConversionPhase = (stage) => {
            const s = String(stage).toLowerCase().trim();
            return s.includes('signed order') || 
                   s.includes('invoice sent') || 
                   s.includes('regular payment') || 
                   s.includes('partial') || 
                   s.includes('overdue') || 
                   s.includes('paid') || 
                   s.includes('comission') || 
                   s.includes('commission');
        };

        const isInProcessPhase = (stage) => {
            const s = String(stage).toLowerCase().trim();
            return s.includes('in process');
        };

        const isMeetingPhase = (stage) => {
            const s = String(stage).toLowerCase().trim();
            return s.includes('meeting') || s.includes('schůzka');
        };

        const isConditionsSentPhase = (stage) => {
            const s = String(stage).toLowerCase().trim();
            return s.includes('conditions sent') || s.includes('nabídka');
        };

        const isOrderSentPhase = (stage) => {
            const s = String(stage).toLowerCase().trim();
            return s.includes('order sent') || s.includes('objednávka odeslána');
        };

        // --- POMOCNÁ FUNKCE PRO ODSTRANĚNÍ SEPARÁTORŮ TISÍCŮ (FOOLPROOF ČIŠTĚNÍ ČÍSEL) ---
        const cleanNumber = (val) => {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            
            let s = String(val).trim();
            
            // Odstranění textových zkratek měn, aby nepletly detekci desítkových separátorů
            s = s.replace(/[a-zA-Z€FtKčKČ]/g, '').trim();
            
            // Odstranění mezer (např. "8 500 000" -> "8500000")
            s = s.replace(/\s/g, '');
            
            const lastComma = s.lastIndexOf(',');
            const lastDot = s.lastIndexOf('.');
            
            if (lastComma !== -1 && lastDot !== -1) {
                if (lastComma > lastDot) {
                    s = s.replace(/\./g, '').replace(',', '.');
                } else {
                    s = s.replace(/,/g, '');
                }
            } else if (lastComma !== -1) {
                const charsAfter = s.length - lastComma - 1;
                if (charsAfter === 2 || charsAfter === 1) {
                    s = s.replace(',', '.');
                } else {
                    s = s.replace(/,/g, '');
                }
            } else if (lastDot !== -1) {
                const firstDot = s.indexOf('.');
                if (firstDot !== lastDot) {
                    s = s.replace(/\./g, '');
                } else {
                    const charsAfter = s.length - lastDot - 1;
                    if (charsAfter === 3 && s.length > 5) {
                        s = s.replace(/\./g, '');
                    }
                }
            }
            
            s = s.replace(/[^\d.-]/g, '');
            
            const parsed = parseFloat(s);
            return isNaN(parsed) ? 0 : parsed;
        };

        // --- LINGVISTICKÉ POMOCNÉ FUNKCE PRO AUTOMATICKOU DETEKCI REGIONŮ ---
        const slovakNamesMatch = (agent, owner, operator, title) => {
            const text = (agent + ' ' + owner + ' ' + operator + ' ' + title).toLowerCase();
            
            const slovakKeys = [
                'šebo', 'sebo', 'korman', 'janák', 'janak', 'jokl', 'ján', 'jozef', 
                'illesová', 'illesova', 'illes', 'slinčáková', 'slincakova', 'lovisek', 'lovíšek', 
                'ganzarčík', 'ganzarcik', 'matus', 'matúš', 'zug', 'zuzana'
            ];
            
            if (/[ľĽôÔŕŔĺĹäÄ]/g.test(agent + ' ' + owner + ' ' + operator + ' ' + title)) {
                return true;
            }
            
            if (text.includes('.sk') || text.includes(' slovensko') || text.includes(' bratislava') || text.includes(' košice') || text.includes(' kosice')) {
                return true;
            }

            return slovakKeys.some(key => text.includes(key));
        };

        const hungarianNamesMatch = (agent, owner, operator, title) => {
            const text = (agent + ' ' + owner + ' ' + operator + ' ' + title).toLowerCase();
            
            if (/[őŐűŰ]/g.test(agent + ' ' + owner + ' ' + operator + ' ' + title)) {
                return true;
            }
            
            if (text.includes('.hu') || text.includes('budapest') || text.includes('kft') || text.includes(' bt.') || text.includes(' ft')) {
                return true;
            }

            return false;
        };

        // --- BULETPROOF CSV PARSER S DETEKCÍ SEPARÁTORU (ČÁRKA VS STŘEDNÍK) ---
        const parseCSV = (text) => {
            let separator = ',';
            const firstLine = text.split('\n')[0];
            if (firstLine.includes(';')) {
                separator = ';';
            }
            
            const lines = text.split(/\r?\n/);
            const result = [];
            if (lines.length === 0 || !lines[0].trim()) return [];
            
            const headers = parseCSVLine(lines[0], separator);
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const currentLine = parseCSVLine(lines[i], separator);
                if (currentLine.length === 0) continue;
                
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = currentLine[index] !== undefined ? currentLine[index] : '';
                });
                result.push(row);
            }
            return result;
        };

        const parseCSVLine = (line, separator) => {
            const result = [];
            let start = 0;
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                if (line[i] === '"') {
                    inQuotes = !inQuotes;
                } else if (line[i] === separator && !inQuotes) {
                    let field = line.slice(start, i).trim();
                    if (field.startsWith('"') && field.endsWith('"')) {
                        field = field.slice(1, -1);
                    }
                    result.push(field.replace(/""/g, '"'));
                    start = i + 1;
                }
            }
            let lastField = line.slice(start).trim();
            if (lastField.startsWith('"') && lastField.endsWith('"')) {
                lastField = lastField.slice(1, -1);
            }
            result.push(lastField.replace(/""/g, '"'));
            return result;
        };

        // --- DETEKTOR KÓDOVÁNÍ (Automaticky přepíná mezi UTF-8 a českým Windows-1250) ---
        const decodeText = (arrayBuffer) => {
            const uint8 = new Uint8Array(arrayBuffer);
            const utf8Decoder = new TextDecoder('utf-8', { fatal: true });
            try {
                return utf8Decoder.decode(uint8);
            } catch (e) {
                const winDecoder = new TextDecoder('windows-1250');
                return winDecoder.decode(uint8);
            }
        };

        // --- INTELIGENTNÍ NORMALIZAČNÍ FUNKCE S DETEKCÍ MĚNY PODLE OSOB A JAZYKA ---
        const normalizePipedriveData = (rawRows) => {
            const EXCHANGE_RATES = {
                'CZK': 1.0,
                'EUR': 25.20,
                'HUF': 0.063
            };

            return rawRows.map(row => {
                const getVal = (possibleKeys) => {
                    // Krok 1: Hledání přesné shody po očištění (case-insensitive)
                    let foundKey = Object.keys(row).find(k => {
                        const cleanK = k.toLowerCase().trim().replace(/^deal\s*-\s*/g, '');
                        return possibleKeys.some(pk => {
                            const cleanPk = pk.toLowerCase().trim().replace(/^deal\s*-\s*/g, '');
                            return cleanK === cleanPk;
                        });
                    });
                    
                    // Krok 2: Pokud přesná shoda selhala, použijeme bezpečné částečné vyhledávání
                    if (!foundKey) {
                        foundKey = Object.keys(row).find(k => {
                            const cleanK = k.toLowerCase().trim().replace(/^deal\s*-\s*/g, '');
                            return possibleKeys.some(pk => {
                                const cleanPk = pk.toLowerCase().trim().replace(/^deal\s*-\s*/g, '');
                                if (cleanK === 'obchodník' && cleanPk === 'obchod') return false;
                                return cleanK.includes(cleanPk) || cleanPk.includes(cleanK);
                            });
                        });
                    }
                    return foundKey ? row[foundKey] : null;
                };

                const title = getVal(['Deal - Název', 'Název', 'Title', 'Subject', 'Deal Name', 'Obchod']) || 'Bez názvu';
                const rawValue = getVal(['Deal - Hodnota', 'Hodnota', 'Value', 'Amount', 'Částka']);
                
                const owner = getVal(['Deal - Vlastník', 'Vlastník', 'Owner', 'Přiřazeno uživateli']) || 'Neznámý';
                const agent = getVal(['Deal - Obchodník', 'Obchodník', 'Salesperson']) || owner;
                const operator = getVal(['Deal - Operátor', 'Operátor', 'Operator']) || '';
                
                const stage = getVal(['Deal - Fáze', 'Fáze', 'Stage', 'Stupeň']) || 'Nedefinováno';
                const statusRaw = String(getVal(['Deal - Stav', 'Stav', 'Status']) || 'open').toLowerCase().trim();
                const lostReason = getVal(['Důvod ztráty', 'Lost reason', 'Důvody ztráty', 'Důvod prohry']) || '';
                const addTime = getVal(['Čas vytvoření', 'Add time', 'Datum vytvoření', 'Created', 'Vytvořeno']) || '';

                let detectedCurrency = 'CZK';
                
                if (rawValue !== null && rawValue !== undefined) {
                    const valStr = String(rawValue).toUpperCase().trim();
                    if (valStr.includes('EUR') || valStr.includes('€')) detectedCurrency = 'EUR';
                    else if (valStr.includes('HUF') || valStr.includes('FT')) detectedCurrency = 'HUF';
                    else if (valStr.includes('CZK') || valStr.includes('KČ')) detectedCurrency = 'CZK';
                }

                if (detectedCurrency === 'CZK') {
                    const currencyCol = getVal(['Měna', 'Currency', 'Deal - Měna', 'Deal - Currency']);
                    if (currencyCol) {
                        const cUpper = String(currencyCol).toUpperCase().trim();
                        if (cUpper.includes('EUR') || cUpper.includes('€')) detectedCurrency = 'EUR';
                        else if (cUpper.includes('HUF') || cUpper.includes('FT')) detectedCurrency = 'HUF';
                        else if (cUpper.includes('CZK') || cUpper.includes('KČ')) detectedCurrency = 'CZK';
                    }
                }

                if (detectedCurrency === 'CZK') {
                    const isSlovak = slovakNamesMatch(agent, owner, operator, title);
                    const isHungarian = hungarianNamesMatch(agent, owner, operator, title);

                    if (isSlovak) {
                        detectedCurrency = 'EUR';
                    } else if (isHungarian) {
                        detectedCurrency = 'HUF';
                    }
                }

                const originalValue = cleanNumber(rawValue);
                const rate = EXCHANGE_RATES[detectedCurrency] || 1.0;
                const valueInCZK = originalValue * rate;

                let status = 'open';
                if (statusRaw.includes('won') || statusRaw.includes('vyhr') || statusRaw.includes('získ') || statusRaw.includes('úspěch')) {
                    status = 'won';
                } else if (statusRaw.includes('lost') || statusRaw.includes('prohr') || statusRaw.includes('ztrác') || statusRaw.includes('ztracen')) {
                    status = 'lost';
                }

                return { 
                    title, 
                    value: valueInCZK,
                    originalValue,
                    originalCurrency: detectedCurrency,
                    owner: agent,
                    originalOwner: owner,
                    operator,
                    stage, 
                    status, 
                    lostReason, 
                    addTime 
                };
            });
        };

        // --- GLOBÁLNÍ ZPRACOVÁNÍ SOUBORŮ ---
        const handleFileUpload = (file) => {
            if (!file) return;
            const fileName = file.name.toLowerCase();
            const reader = new FileReader();

            if (fileName.endsWith('.csv')) {
                reader.onload = (e) => {
                    try {
                        const text = decodeText(e.target.result);
                        const json = parseCSV(text);
                        
                        if (json.length === 0) {
                            showNotification("Nahrávaný CSV soubor neobsahuje žádná data.", "error");
                            return;
                        }

                        state.deals = normalizePipedriveData(json);
                        state.ownerFilter = 'all';
                        state.statusFilter = 'all';
                        state.searchTerm = '';
                        
                        showNotification(`Úspěšně naimportováno ${state.deals.length} obchodů z CSV (s kódováním češtiny)!`, "success");
                        render();
                    } catch (err) {
                        showNotification("Chyba při parsování CSV souboru.", "error");
                        console.error(err);
                    }
                };
                reader.readAsArrayBuffer(file);
            } else {
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = XLSX.utils.sheet_to_json(worksheet);
                        
                        if (json.length === 0) {
                            showNotification("Nahrávaný Excel soubor neobsahuje žádná data.", "error");
                            return;
                        }

                        state.deals = normalizePipedriveData(json);
                        state.ownerFilter = 'all';
                        state.statusFilter = 'all';
                        state.searchTerm = '';
                        
                        showNotification(`Úspěšně naimportováno ${state.deals.length} obchodů z Excelu!`, "success");
                        render();
                    } catch (err) {
                        showNotification("Chyba při čtení Excel souboru.", "error");
                        console.error(err);
                    }
                };
                reader.readAsArrayBuffer(file);
            }
        };

        // --- VÝPOČET STATISTIK S PŘESNÝM KALKULAČNÍM MODELEM ---
        const getStatsAndFilteredData = () => {
            const uniqueOwners = Array.from(new Set(state.deals.map(d => d.owner))).sort();
            
            // Mapování vybraného vlastníka přes stabilní index
            const selectedOwner = state.ownerFilter === 'all' ? 'all' : uniqueOwners[parseInt(state.ownerFilter)];

            const filtered = state.deals.filter(deal => {
                // Podpora pro vyhledávání (s ochranou proti přeložení "Vebrová" -> "bagel")
                const searchLower = state.searchTerm.toLowerCase();
                let matchesSearch = deal.title.toLowerCase().includes(searchLower) || 
                                      deal.owner.toLowerCase().includes(searchLower) ||
                                      deal.operator.toLowerCase().includes(searchLower);
                
                // Překladačový fallback: pokud uživatel hledá "bagel" a obchodník je "Vebrová Dagmar"
                if (!matchesSearch && searchLower.includes('bagel')) {
                    if (deal.owner.toLowerCase().includes('vebrová') || deal.owner.toLowerCase().includes('dagmar')) {
                        matchesSearch = true;
                    }
                }

                const matchesOwner = state.ownerFilter === 'all' || deal.owner === selectedOwner;
                const matchesStatus = state.statusFilter === 'all' || deal.status === state.statusFilter;
                return matchesSearch && matchesOwner && matchesStatus;
            });

            const total = filtered.length;
            let totalValue = 0;

            // Mapy pro reálné kódované měny v celkových přehledech
            let totalValueByCurr = { CZK: 0, EUR: 0, HUF: 0 };
            let conversionsValueByCurr = { CZK: 0, EUR: 0, HUF: 0 };
            let inProcessValueByCurr = { CZK: 0, EUR: 0, HUF: 0 };
            let meetingValueByCurr = { CZK: 0, EUR: 0, HUF: 0 };
            let conditionsValueByCurr = { CZK: 0, EUR: 0, HUF: 0 };
            let orderSentValueByCurr = { CZK: 0, EUR: 0, HUF: 0 };

            let conversionsCount = 0;
            let conversionsValue = 0;

            let inProcessCount = 0;
            let inProcessValue = 0;

            let meetingCount = 0;
            let meetingValue = 0;

            let conditionsCount = 0;
            let conditionsValue = 0;

            let orderSentCount = 0;
            let orderSentValue = 0;

            filtered.forEach(d => {
                totalValue += d.value;
                const curr = d.originalCurrency || 'CZK';
                const origVal = d.originalValue || 0;
                
                totalValueByCurr[curr] = (totalValueByCurr[curr] || 0) + origVal;
                
                if (isConversionPhase(d.stage)) {
                    conversionsCount++;
                    conversionsValue += d.value;
                    conversionsValueByCurr[curr] = (conversionsValueByCurr[curr] || 0) + origVal;
                } else if (isInProcessPhase(d.stage)) {
                    inProcessCount++;
                    inProcessValue += d.value;
                    inProcessValueByCurr[curr] = (inProcessValueByCurr[curr] || 0) + origVal;
                } else if (isMeetingPhase(d.stage)) {
                    meetingCount++;
                    meetingValue += d.value;
                    meetingValueByCurr[curr] = (meetingValueByCurr[curr] || 0) + origVal;
                } else if (isConditionsSentPhase(d.stage)) {
                    conditionsCount++;
                    conditionsValue += d.value;
                    conditionsValueByCurr[curr] = (conditionsValueByCurr[curr] || 0) + origVal;
                } else if (isOrderSentPhase(d.stage)) {
                    orderSentCount++;
                    orderSentValue += d.value;
                    orderSentValueByCurr[curr] = (orderSentValueByCurr[curr] || 0) + origVal;
                }
            });

            const conversionRate = total > 0 ? Math.round((conversionsCount / total) * 100) : 0;
            const inProcessRate = total > 0 ? Math.round((inProcessCount / total) * 100) : 0;
            const meetingRate = total > 0 ? Math.round((meetingCount / total) * 100) : 0;
            const conditionsRate = total > 0 ? Math.round((conditionsCount / total) * 100) : 0;
            const orderSentRate = total > 0 ? Math.round((orderSentCount / total) * 100) : 0;

            const avgValue = conversionsCount > 0 ? Math.round(conversionsValue / conversionsCount) : 0;

            // Výkon obchodníků s rozpadem na konkrétní měny
            const repsMap = {};
            filtered.forEach(d => {
                if (!repsMap[d.owner]) {
                    repsMap[d.owner] = { 
                        name: d.owner, 
                        wonVal: 0, lostVal: 0, openVal: 0, count: 0, totalVal: 0, convCount: 0,
                        wonValByCurr: { CZK: 0, EUR: 0, HUF: 0 },
                        openValByCurr: { CZK: 0, EUR: 0, HUF: 0 },
                        lostValByCurr: { CZK: 0, EUR: 0, HUF: 0 },
                        totalValByCurr: { CZK: 0, EUR: 0, HUF: 0 }
                    };
                }
                const curr = d.originalCurrency || 'CZK';
                const origVal = d.originalValue || 0;
                
                repsMap[d.owner].count++;
                repsMap[d.owner].totalVal += d.value;
                repsMap[d.owner].totalValByCurr[curr] = (repsMap[d.owner].totalValByCurr[curr] || 0) + origVal;
                
                if (isConversionPhase(d.stage)) {
                    repsMap[d.owner].wonVal += d.value;
                    repsMap[d.owner].convCount++;
                    repsMap[d.owner].wonValByCurr[curr] = (repsMap[d.owner].wonValByCurr[curr] || 0) + origVal;
                } else {
                    repsMap[d.owner].openVal += d.value;
                    repsMap[d.owner].openValByCurr[curr] = (repsMap[d.owner].openValByCurr[curr] || 0) + origVal;
                }
                if (d.status === 'lost') {
                    repsMap[d.owner].lostVal += d.value;
                    repsMap[d.owner].lostValByCurr[curr] = (repsMap[d.owner].lostValByCurr[curr] || 0) + origVal;
                }
            });
            const ownerStats = Object.values(repsMap).sort((a, b) => b.totalVal - a.totalVal);

            // Výkon operátorů s rozpadem na konkrétní měny
            const operatorMap = {};
            filtered.forEach(d => {
                if (!d.operator) return;
                if (!operatorMap[d.operator]) {
                    operatorMap[d.operator] = { 
                        name: d.operator, 
                        wonVal: 0, lostVal: 0, openVal: 0, count: 0, totalVal: 0, convCount: 0,
                        wonValByCurr: { CZK: 0, EUR: 0, HUF: 0 },
                        openValByCurr: { CZK: 0, EUR: 0, HUF: 0 },
                        lostValByCurr: { CZK: 0, EUR: 0, HUF: 0 },
                        totalValByCurr: { CZK: 0, EUR: 0, HUF: 0 }
                    };
                }
                const curr = d.originalCurrency || 'CZK';
                const origVal = d.originalValue || 0;
                
                operatorMap[d.operator].count++;
                operatorMap[d.operator].totalVal += d.value;
                operatorMap[d.operator].totalValByCurr[curr] = (operatorMap[d.operator].totalValByCurr[curr] || 0) + origVal;
                
                if (isConversionPhase(d.stage)) {
                    operatorMap[d.operator].wonVal += d.value;
                    operatorMap[d.operator].convCount++;
                    operatorMap[d.operator].wonValByCurr[curr] = (operatorMap[d.operator].wonValByCurr[curr] || 0) + origVal;
                } else {
                    operatorMap[d.operator].openVal += d.value;
                    operatorMap[d.operator].openValByCurr[curr] = (operatorMap[d.operator].openValByCurr[curr] || 0) + origVal;
                }
            });
            const operatorStats = Object.values(operatorMap).sort((a, b) => b.totalVal - a.totalVal);

            const stageMap = {};
            filtered.forEach(d => {
                if (!stageMap[d.stage]) {
                    stageMap[d.stage] = { stage: d.stage, value: 0, count: 0 };
                }
                stageMap[d.stage].value += d.value;
                stageMap[d.stage].count++;
            });
            const stageStats = Object.values(stageMap).sort((a, b) => b.value - a.value);

            return {
                filtered,
                uniqueOwners,
                ownerStats,
                operatorStats,
                stageStats,
                kpi: {
                    total,
                    totalValue,
                    totalValueByCurr,
                    conversionsCount,
                    conversionsValue,
                    conversionsValueByCurr,
                    conversionRate,
                    inProcessCount,
                    inProcessValue,
                    inProcessValueByCurr,
                    meetingCount,
                    meetingValue,
                    meetingValueByCurr,
                    meetingRate,
                    conditionsCount,
                    conditionsValue,
                    conditionsValueByCurr,
                    conditionsRate,
                    orderSentCount,
                    orderSentValue,
                    orderSentValueByCurr,
                    orderSentRate,
                    avgValue
                }
            };
        };

        // --- MANIPULACE SE STAVEM ---
        const loadSample = () => {
            state.deals = normalizePipedriveData(SAMPLE_DATA);
            state.ownerFilter = 'all';
            state.statusFilter = 'all';
            state.searchTerm = '';

            render();

            state.deals = [];

            render();

        // --- RENDEROVÁNÍ ROZHRANÍ ---

                        ${Icons.Refresh} Vyčistit data
                    </button>
                    <label class="cursor-pointer bg-slate-800 hover:bg-slate-700 text-white text-sm font-semibold px-4 py-2 rounded-lg shadow border border-slate-700 flex items-center gap-2 transition">
                        ${Icons.Upload} <span>Nahrát export</span>
                        <input type="file" id="file-input-header" class="hidden" accept=".xlsx, .xls, .csv" />
                    </label>
                `;
                document.getElementById('btn-clear').addEventListener('click', resetData);
                document.getElementById('file-input-header').addEventListener('change', (e) => handleFileUpload(e.target.files[0]));
            } else {
                headerActions.innerHTML = '';
            }

            // 2. Vykreslení hlavní sekce podle stavu
            if (state.deals.length === 0) {
                // --- STRÁNKA S IMPORTEM ---
                mainContent.innerHTML = `
                    <div class="max-w-3xl mx-auto mt-8">

                        <!-- Drop zóna -->
                        <div id="drop-zone" class="border-3 border-dashed rounded-2xl p-10 text-center transition duration-200 cursor-pointer ${
                            state.dragActive ? "border-emerald-500 bg-emerald-50/50" : "border-slate-300 bg-white hover:border-slate-400 shadow-sm"
                        }">
                            <div class="flex flex-col items-center pointer-events-none">
                                <div class="p-4 bg-emerald-50 text-emerald-600 rounded-full mb-4">
                                    ${Icons.FileSpreadsheet}
                                </div>
                                <p class="text-lg font-semibold text-slate-800 mb-2">Přetáhněte sem exportovaný soubor</p>
                                <p class="text-sm text-slate-500 mb-6">Podporujeme CZK, EUR i HUF s automatickým přepočtem</p>
                                
                                <div class="flex flex-wrap gap-4 justify-center pointer-events-auto">
                                    <label class="cursor-pointer bg-slate-900 hover:bg-slate-800 text-white font-semibold px-5 py-2.5 rounded-xl shadow-lg transition flex items-center gap-2">
                                        ${Icons.Upload} Vybrat soubor z PC
                                        <input type="file" id="file-input-main" accept=".xlsx, .xls, .csv" class="hidden" />
                                    </label>
                                    
                                    <button id="btn-load-sample" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-5 py-2.5 rounded-xl shadow-lg transition flex items-center gap-2">
                                        ${Icons.Refresh} Načíst ukázková data
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Instrukce -->
                        <div class="mt-12 bg-white rounded-xl p-6 shadow-sm border border-slate-100">
                            <h3 class="text-md font-semibold text-slate-800 mb-3 flex items-center gap-2">
                                ${Icons.Info} Jak získat správný soubor z Pipedrive?
                            </h3>
                            <ol class="list-decimal list-inside text-sm text-slate-600 space-y-2">
                                <li>Přihlaste se do účtu <strong>Pipedrive</strong>.</li>
                                <li>Přejdete do sekce <strong>Obchody (Deals)</strong>.</li>
                                <li>Vpravo nahoře klikněte na tři tečky a vyberte <strong>Exportovat výsledky filtru</strong>.</li>
                                <li>Zvolte formát <strong>Excel (.xlsx)</strong> nebo <strong>CSV</strong> a stáhněte soubor.</li>
                                <li>Stažený soubor jednoduše přetáhněte do zóny výše!</li>
                            </ol>
                        </div>
                    </div>
                `;

                const dropZone = document.getElementById('drop-zone');
                const fileInputMain = document.getElementById('file-input-main');
                const btnLoadSample = document.getElementById('btn-load-sample');

                btnLoadSample.addEventListener('click', loadSample);
                fileInputMain.addEventListener('change', (e) => handleFileUpload(e.target.files[0]));
            } else {
                // --- STRÁNKA S AKTIVNÍM DASHBOARDEM ---
                const data = getStatsAndFilteredData();

                mainContent.innerHTML = `

                                <p class="text-xs text-slate-300">Všechny slovenské EUR i maďarské HUF obchody byly automaticky rozpoznány na základě obchodníků a sjednoceny do <strong>CZK (Kč)</strong>.</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 text-xs font-mono shrink-0 bg-slate-950/50 px-3 py-1.5 rounded-lg border border-slate-700">
                            <span class="text-emerald-400">1 EUR = 25,20 CZK</span>
                            <span class="text-slate-600">|</span>
                            <span class="text-emerald-400">100 HUF = 6,30 CZK</span>

                    <!-- FILTRY A NAVIGACE -->

                                state.activeTab === 'dashboard' ? 'bg-emerald-500 text-white shadow' : 'text-slate-600 hover:bg-slate-50'

                                ${Icons.BarChart} Výkon Call Centra

                            }">
                                ${Icons.Users} Obchodníci & Operátoři
                            </button>
                            <button id="tab-list" class="px-4 py-2 font-semibold text-sm rounded-lg transition shrink-0 flex items-center gap-2 ${

                            }">
                                ${Icons.FileSpreadsheet} Seznam Obchodů (${data.filtered.length})
                            </button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                            <div class="relative">
                                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Hledat obchod / osobu</label>
                                <div class="relative">
                                    <div class="absolute left-3 top-3 text-slate-400">${Icons.Search}</div>
                                    <input 
                                        type="text" 
                                        id="search-input"
                                        placeholder="Hledat název, obchodníka, operátora..." 
                                        value="${state.searchTerm}"
                                        class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-2 text-slate-700 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition"
                                    />
                                </div>

                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Vlastník / Obchodník</label>

                    <!-- DYNAMICKÁ SEKCE PODLE ZÁLOŽKY -->
                    <div id="tab-view-container"></div>
                `;

                                    </div>
                                    <div class="flex justify-between items-center text-sm border-b border-slate-50 pb-2">
                                        <span class="text-emerald-600 font-bold">Kladné konverze:</span>
                                        <span class="font-bold text-emerald-600">${data.kpi.conversionsCount} ks</span>

                                    <!-- 1. Sjednaná schůzka (Zaevidováno) -->

                                        <div class="flex justify-between items-center mb-2 text-sm">

                                            </div>
                                            <div class="text-right">
                                                <span class="font-bold text-blue-600 text-lg">${data.kpi.meetingRate}%</span>

                                            </div>
                                        </div>
                                        <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                            <div class="bg-blue-500 h-full rounded-full transition-all duration-500" style="width: ${data.kpi.meetingRate}%"></div>
                                        </div>
                                    </div>

                                    <!-- 2. Odloženo (In Process) -->
                                    <div>
                                        <div class="flex justify-between items-center mb-2 text-sm">
                                            <div>
                                                <span class="font-bold text-slate-800">2. Odložené případy (In Process)</span>
                                                <span class="text-xs text-slate-400 block">Zatím neuzavřené / odložené obchody</span>
                                            </div>
                                            <div class="text-right">
                                                <span class="font-bold text-amber-500 text-lg">${data.kpi.inProcessRate}%</span>
                                                <span class="text-xs text-slate-500 block">${data.kpi.inProcessCount} ks (${formatCZK(data.kpi.inProcessValue)})</span>
                                            </div>
                                        </div>
                                        <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                            <div class="bg-amber-500 h-full rounded-full transition-all duration-500" style="width: ${data.kpi.inProcessRate}%"></div>
                                        </div>
                                    </div>

                                    <!-- 3. Rozjednané obchody (Conditions Sent) -->
                                    <div>
                                        <div class="flex justify-between items-center mb-2 text-sm">
                                            <div>
                                                <span class="font-bold text-slate-800">3. Zaslaná Cenová Nabídka (Conditions Sent)</span>
                                                <span class="text-xs text-slate-400 block">Rozjednané případy s odeslanou nabídkou</span>
                                            </div>
                                            <div class="text-right">
                                                <span class="font-bold text-indigo-500 text-lg">${data.kpi.conditionsRate}%</span>
                                                <span class="text-xs text-slate-500 block">${data.kpi.conditionsCount} ks (${formatCZK(data.kpi.conditionsValue)})</span>
                                            </div>
                                        </div>
                                        <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                            <div class="bg-indigo-500 h-full rounded-full transition-all duration-500" style="width: ${data.kpi.conditionsRate}%"></div>
                                        </div>
                                    </div>

                                    <!-- 4. Odeslaná objednávka (Order Sent) -->
                                    <div>
                                        <div class="flex justify-between items-center mb-2 text-sm">
                                            <div>
                                                <span class="font-bold text-slate-800">4. Objednávka k Podpisu (Order Sent)</span>
                                                <span class="text-xs text-slate-400 block">Odeslaná objednávka připravená k uzavření</span>
                                            </div>
                                            <div class="text-right">
                                                <span class="font-bold text-purple-500 text-lg">${data.kpi.orderSentRate}%</span>
                                                <span class="text-xs text-slate-500 block">${data.kpi.orderSentCount} ks (${formatCZK(data.kpi.orderSentValue)})</span>
                                            </div>
                                        </div>
                                        <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                            <div class="bg-purple-500 h-full rounded-full transition-all duration-500" style="width: ${data.kpi.orderSentRate}%"></div>
                                        </div>
                                    </div>

                                    <!-- 5. Kladné Konverze -->
                                    <div>
                                        <div class="flex justify-between items-center mb-2 text-sm">
                                            <div>
                                                <span class="font-bold text-emerald-600">5. Kladně Uzavřeno (Conversions)</span>
                                                <span class="text-xs text-emerald-500 block">Signed, Paid, Commission atd.</span>
                                            </div>
                                            <div class="text-right">
                                                <span class="font-bold text-emerald-600 text-lg">${data.kpi.conversionRate}%</span>
                                                <span class="text-xs text-slate-500 block">${data.kpi.conversionsCount} ks (${formatCZK(data.kpi.conversionsValue)})</span>
                                            </div>
                                        </div>
                                        <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">

                    `;
                } else if (state.activeTab === 'salespeople') {
                    // --- ZÁLOŽKA: OBCHODNÍCI A OPERÁTOŘI (S PŮVODNÍMI MĚNAMI) ---
                    tabViewContainer.innerHTML = `
                        <div class="space-y-8">
                            <!-- Výsledky Obchodníků -->
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <h3 class="text-md font-bold text-slate-800 mb-6">Výsledky Obchodníků (Deal - Obchodník)</h3>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left text-sm">
                                        <thead>
                                            <tr class="border-b border-slate-100 text-slate-400 text-xs font-semibold uppercase tracking-wider pb-3">
                                                <th class="py-3 px-4">Obchodník</th>
                                                <th class="py-3 px-4">Celkem případů</th>

                                                <th class="py-3 px-4 text-emerald-600 font-semibold">Počet konverzí</th>
                                                <th class="py-3 px-4 font-semibold text-slate-700">Rozpracovaný objem</th>
                                                <th class="py-3 px-4 font-semibold text-slate-700">Win Rate %</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-50 text-slate-700">
                                            ${data.ownerStats.map(rep => {
                                                const winRate = rep.count > 0 ? Math.round((rep.convCount / rep.count) * 100) : 0;
                                                return `
                                                    <tr class="hover:bg-slate-50/70 transition">
                                                        <td class="py-4 px-4 font-bold text-slate-900">${rep.name}</td>
                                                        <td class="py-4 px-4">${rep.count} ks</td>
                                                        <td class="py-4 px-4 text-emerald-600 font-semibold">${formatMultiCurrency(rep.wonValByCurr, rep.wonVal)}</td>
                                                        <td class="py-4 px-4 text-emerald-600 font-bold">${rep.convCount} ks</td>
                                                        <td class="py-4 px-4 text-amber-600 font-medium">${formatMultiCurrency(rep.openValByCurr, rep.openVal)}</td>
                                                        <td class="py-4 px-4">
                                                            <div class="flex items-center gap-2">
                                                                <span class="font-bold w-10 text-right">${winRate}%</span>
                                                                <div class="w-24 bg-slate-100 h-2 rounded-full overflow-hidden">
                                                                    <div class="bg-emerald-500 h-full rounded-full" style="width: ${winRate}%"></div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <!-- Výsledky Operátorů -->
                            ${data.operatorStats.length > 0 ? `
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                    <h3 class="text-md font-bold text-slate-800 mb-6">Výkonnost Operátorů (Deal - Operátor)</h3>
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left text-sm">
                                            <thead>
                                                <tr class="border-b border-slate-100 text-slate-400 text-xs font-semibold uppercase tracking-wider pb-3">
                                                    <th class="py-3 px-4">Operátor</th>
                                                    <th class="py-3 px-4">Zajištěno obchodů</th>
                                                    <th class="py-3 px-4 text-emerald-600 font-semibold">Získaný objem</th>
                                                    <th class="py-3 px-4 text-emerald-600 font-semibold">Počet konverzí</th>
                                                    <th class="py-3 px-4 font-semibold text-slate-700">Rozpracovaný objem</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-50 text-slate-700">
                                                ${data.operatorStats.map(op => `
                                                    <tr class="hover:bg-slate-50/70 transition">
                                                        <td class="py-4 px-4 font-bold text-slate-900">${op.name}</td>
                                                        <td class="py-4 px-4">${op.count} ks</td>
                                                        <td class="py-4 px-4 text-emerald-600 font-semibold">${formatMultiCurrency(op.wonValByCurr, op.wonVal)}</td>
                                                        <td class="py-4 px-4 text-emerald-600 font-bold">${op.convCount} ks</td>
                                                        <td class="py-4 px-4 text-amber-600 font-medium">${formatMultiCurrency(op.openValByCurr, op.openVal)}</td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                } else if (state.activeTab === 'list') {
                    // --- ZÁLOŽKA: SEZNAM OBCHODŮ ---
                    tabViewContainer.innerHTML = `
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                            <div class="p-5 border-b border-slate-100">
                                <h3 class="text-md font-bold text-slate-800">Detailní přehled vyfiltrovaných obchodů</h3>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm">
                                    <thead>
                                        <tr class="border-b border-slate-100 bg-slate-50 text-slate-400 text-xs font-semibold uppercase tracking-wider">
                                            <th class="py-4 px-6">Název obchodu</th>
                                            <th class="py-4 px-4">Obchodník</th>
                                            <th class="py-4 px-4">Operátor</th>
                                            <th class="py-4 px-4">Fáze</th>
                                            <th class="py-4 px-4 text-right">Hodnota (Původní & CZK)</th>
                                            <th class="py-4 px-4 text-center">Vyhodnocení</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100 text-slate-700">
                                        ${data.filtered.length === 0 ? `
                                            <tr>
                                                <td colSpan="6" class="py-8 text-center text-slate-400">Žádné obchody neodpovídají filtrům.</td>
                                            </tr>
                                        ` : data.filtered.map(deal => `
                                            <tr class="hover:bg-slate-50/70 transition">
                                                <td class="py-4 px-6 font-bold text-slate-800">${deal.title}</td>
                                                <td class="py-4 px-4 text-slate-600">${deal.owner}</td>
                                                <td class="py-4 px-4 text-slate-500 italic">${deal.operator || '-'}</td>
                                                <td class="py-4 px-4">
                                                    <span class="bg-blue-50 text-blue-700 px-2.5 py-1 rounded-md text-xs font-semibold">
                                                        ${deal.stage}
                                                    </span>
                                                </td>
                                                <td class="py-4 px-4 text-right font-bold text-slate-900">${formatOriginalValue(deal)}</td>
                                                <td class="py-4 px-4 text-center">
                                                    <span class="inline-block px-2.5 py-1 rounded-full text-xs font-bold ${
                                                        isConversionPhase(deal.stage) ? 'bg-emerald-100 text-emerald-800' :
                                                        isInProcessPhase(deal.stage) ? 'bg-amber-100 text-amber-800' : 'bg-slate-100 text-slate-700'
                                                    }">
                                                        ${isConversionPhase(deal.stage) ? 'Kladná konverze' : 
                                                          isInProcessPhase(deal.stage) ? 'Odloženo' : 'Ostatní fáze'}
                                                    </span>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                }

                // --- PŘIPOJENÍ EVENTŮ ---
                document.getElementById('tab-dashboard').addEventListener('click', () => { state.activeTab = 'dashboard'; render(); });
                document.getElementById('tab-salespeople').addEventListener('click', () => { state.activeTab = 'salespeople'; render(); });
                document.getElementById('tab-list').addEventListener('click', () => { state.activeTab = 'list'; render(); });

                document.getElementById('owner-filter-select').addEventListener('change', (e) => {
                    state.ownerFilter = e.target.value;
                    render();
                });
                document.getElementById('status-filter-select').addEventListener('change', (e) => {
                    state.statusFilter = e.target.value;
                    render();
                });

                const searchInput = document.getElementById('search-input');
                searchInput.addEventListener('input', (e) => {
                    state.searchTerm = e.target.value;
                    const freshData = getStatsAndFilteredData();
                    const visibleCountSpan = searchInput.closest('div').parentElement.nextElementSibling.nextElementSibling.nextElementSibling?.querySelector('.font-bold');
                    if (visibleCountSpan) {
                        visibleCountSpan.textContent = `${freshData.filtered.length} z ${state.deals.length}`;
                    }
                });

                searchInput.addEventListener('change', () => { render(); });
                searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') render(); });
                
                if (document.activeElement && document.activeElement.id !== 'search-input' && state.searchTerm !== '') {
                    const newInput = document.getElementById('search-input');
                    if (newInput) {
                        newInput.focus();
                        newInput.setSelectionRange(newInput.value.length, newInput.value.length);
                    }
                }
            }
        };

        // --- BEZPEČNÝ GLOBÁLNÍ DRAG & DROP PRO CELÉ OKNO ---
        window.addEventListener('dragenter', (e) => {
            e.preventDefault();
            const dropZone = document.getElementById('drop-zone');
            if (dropZone) dropZone.classList.add('border-emerald-500', 'bg-emerald-50/50');
        });
        window.addEventListener('dragover', (e) => {
            e.preventDefault();
        });
        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            if (e.clientX === 0 && e.clientY === 0) {
                const dropZone = document.getElementById('drop-zone');
                if (dropZone) dropZone.classList.remove('border-emerald-500', 'bg-emerald-50/50');
            }
        });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            const dropZone = document.getElementById('drop-zone');
            if (dropZone) dropZone.classList.remove('border-emerald-500', 'bg-emerald-50/50');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                handleFileUpload(e.dataTransfer.files[0]);
            }
        });

        // --- PRVNÍ SPUŠTĚNÍ ---
        render();
    </script>
</body>
</html>
